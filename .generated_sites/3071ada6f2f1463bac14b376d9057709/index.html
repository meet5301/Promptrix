<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clean personal tech blog · Home</title>
<meta name="description" content="Minimal white theme with blue accents. 6 blog post cards. Newsletter section. pages: Home, Articles, About">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

        :root {
            --primary: #ffffff;
            --accent: #2563eb;
            --surface: #f0eae4;
            --text: #0f172a;
            --muted: #64748b;
            --radius: 0.35rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; line-height: 1.6; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { opacity: 0.85; }
        button:hover, .px-nav-cta:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .px-card:hover { transform: translateY(-4px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .px-card, .px-container, .px-gallery-item { transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .px-hero::after {
            content:''; position:absolute; inset:0;
            background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.12), transparent 40%);
            pointer-events:none;
        }
        section { scroll-margin-top: 88px; position: relative; }
        img { max-width: 100%; display: block; }
        @keyframes px-fade-up {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        main > section { animation: px-fade-up 0.6s ease both; }
        main > section:nth-child(2) { animation-delay: 0.05s; }
        main > section:nth-child(3) { animation-delay: 0.1s; }
        @media (max-width: 768px) {
            .px-nav { padding: 0.75rem 1rem !important; }
            .px-hero { min-height: 55vh !important; padding: 3rem 1rem !important; }
            h1 { font-size: 1.85rem !important; }
            h2 { font-size: 1.5rem !important; }
            section { padding: 2.5rem 1rem !important; }
        }
        
</style>
</head>
<body style="background:#ffffff;color:#0f172a">
<header class="px-nav" style="
            display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
            padding:1rem 5%;background:#ffffff;border-bottom:3px solid #2563eb;
            position:sticky;top:0;z-index:200;
        ">
            <a href="#hero" class="px-nav-link" style="font-size:1.35rem;font-weight:800;color:#ffffff;text-decoration:none">
                Clean personal tech blog
            </a>
            <nav style="display:flex;gap:1.25rem;align-items:center;flex-wrap:wrap;"><a href="#hero" class="px-nav-link" style="color:#ffffff;opacity:0.9;text-decoration:none;font-size:0.9rem">Home</a><a href="#newsletter" class="px-nav-link" style="color:#ffffff;opacity:0.9;text-decoration:none;font-size:0.9rem">Articles</a></nav>
            <a href="#cta" class="px-nav-cta px-nav-link" style="
                background:#2563eb;color:#0f172a;text-decoration:none;
                padding:0.55rem 1.35rem;border-radius:0.35rem;font-weight:700;font-size:0.9rem;
            ">Get Started</a>
        </header>
<main>
<section style="padding:3rem 5%;text-align:center;background:#f0eae4">
            <h2 style="font-size:1.75rem;font-weight:800;margin-bottom:1rem;color:#0f172a">Stay in the loop</h2>
            <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;max-width:480px;margin:0 auto">
                <input type="email" placeholder="you@email.com" style="flex:1;min-width:200px;padding:0.75rem;border-radius:0.5rem;border:1px solid #ccc">
                <button style="background:#ffffff;color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:600">Subscribe</button>
            </div>
        </section>
</main>
<footer style="background:#28388a;color:#ffffff;padding:3rem 5%;border-top:4px solid #2563eb">
            <div style="max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:2rem;margin-bottom:2rem">
                <div>
                    <div style="font-weight:800;margin-bottom:1rem;font-size:1.2rem;color:#2563eb">Clean personal tech blog</div>
                    <p style="color:rgba(255,255,255,0.65);font-size:0.875rem;line-height:1.6">Single-page website built from your prompt — click menu to jump to any section.</p>
                </div>
                <div>
                    <div style="font-weight:700;margin-bottom:1rem">Quick Links</div>
                    <div style="display:flex;flex-direction:column;gap:0.5rem"><a href="#hero" class="px-nav-link" style="color:rgba(255,255,255,0.65);text-decoration:none;font-size:0.875rem">Home</a><a href="#newsletter" class="px-nav-link" style="color:rgba(255,255,255,0.65);text-decoration:none;font-size:0.875rem">Articles</a></div>
                </div>
            </div>
            <div style="border-top:1px solid #2563eb44;padding-top:1.5rem;text-align:center;color:rgba(255,255,255,0.65);font-size:0.875rem">
                © 2025 Clean personal tech blog. All rights reserved.
            </div>
        </footer>
<script>
        document.querySelectorAll('a.px-nav-link[href^="#"], a[href^="#"]').forEach(link => {
            link.addEventListener('click', function(e) {
                const id = this.getAttribute('href');
                if (!id || id === '#') return;
                const target = document.querySelector(id);
                if (target) {
                    e.preventDefault();
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    history.replaceState(null, '', id);
                }
            });
        });
        </script>
</body>
</html>
